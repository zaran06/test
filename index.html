<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style/style.css">
  <title>Product card</title>
</head>
<body>
  <img src="/images/bg-dandelions.png" alt="Фоновые одуванчики" class="bg-dandelions">
  <h1 class="main-title">Выбери свой продукт</h1>  
  <div class="buttons">
    <button id="recolor-first-card-button">Перекрасить фон первой карточки</button>
    <button id="recolor-all-card-button">Перекрасить фон всех карточек</button>
    <button id="open-google-button">Открыть Google</button>
    <button id="change-the-color-of-the-button" class="active">Изменить цвет кнопки</button>
  </div>

  <div class="container">
    
  </div>
  <template id="product-template">
    <div class="product-card">
      <img src="" alt="" class="card-image">
      <p class="card-category"></p>
      <h3 class="card-title"></h3>
      <p class="card-description"></p>

      <div class="composition-wrapper">
        <span class="composition-title">Состав: </span>
        <ul class="composition-list">
          
        </ul>
      </div>
      <div class="price-block">
        <span class="price-label">Цена</span>
        <span class="price-value"></span>
      </div>
    </div>
  </template>
  <script src="script.js"></script>
  <script src="homework-5.js"></script>
  <script src="homework-6.js"></script>
  <script src="homework-7.js" type="module"></script>
  <script src="homework-8.js" type="module"></script>
</body>
</html>

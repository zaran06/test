<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style/style.css">
  <title>Product card</title>
</head>
<body>
  <img src="/images/bg-dandelions.png" alt="Фоновые одуванчики" class="bg-dandelions">
  <h1 class="main-title">Выбери свой продукт</h1>  
  <div class="buttons">
    <button id="recolor-first-card-button">Перекрасить фон первой карточки</button>
    <button id="recolor-all-card-button">Перекрасить фон всех карточек</button>
    <button id="open-google-button">Открыть Google</button>
    <button id="change-the-color-of-the-button" class="active">Изменить цвет кнопки</button>
    <button id="Registration-button">Регистрация</button>
  </div>

  <div class="container"></div>
  
  <template id="product-template">
    <div class="product-card">
      <img src="" alt="" class="card-image">
      <p class="card-category"></p>
      <h3 class="card-title"></h3>
      <p class="card-description"></p>

      <div class="composition-wrapper">
        <span class="composition-title">Состав: </span>
        <ul class="composition-list"></ul>
      </div>
      <div class="price-block">
        <span class="price-label">Цена</span>
        <span class="price-value"></span>
      </div>
    </div>
  </template>
  <footer>
    <div class="footer-container">
      <div class="logo-block">
        <h4 class="logo-title">Product Cards</h4>
        <p class="logo-text">У Нас Самые Лучшие Продукты Для Кожи!</p>

        <div class="social-links">
          <a href="#" class="social-item-telegram">
            <img src="images/telegram.svg" alt="Telegram">
          </a>
          <a href="#" class="social-item-vk">
            <img src="images/vk.svg" alt="Vk">
          </a>
        </div>
      </div>
      <div class="form-block">
        <label for="user-email" class="form-title">Подпишись на наши акции:</label>
        <form id="form-email">
          <input type="email" id="user-email" name="email" placeholder="Введи Email..." required>
          <button type="submit" id="Subscribe">Подписаться</button>
        </form>
      </div>
      <div class="navigation-block">
        <h5 class="navigation-title">Быстрые ссылки</h5>
        <nav class="footer-menu">
          <ul class="footer-menu-list">
            <li class="footer-menu-item"> 
              <a href="#" class="footer-menu-link">Главная</a>
            </li>
            <li class="footer-menu-item">
              <a href="#" class="footer-menu-link">Магазин</a>
            </li>
            <li class="footer-menu-item">
              <a href="#" class="footer-menu-link">Контакты</a>
            </li>
          </ul>
        </nav>
      </div>
    </div>
    <div class="copyright-block">
      <div class="copyright-line"></div> 
        <p class="copyright-text">www.product-cards.com©all right reserve</p>
      </div>
    </div>
  </footer>
  <div class="modal">
    <div class="modal-window">
      <button class="close-btn">&times;</button>
      <h2 class="registration">Регистрация</h2>
      <form id="registration-form">
        <label for="user-name">Имя:</label>
        <input type="text" id="user-name" placeholder="Введите Имя"required>
        <label for="user-surname">Фамилия:</label>
        <input type="text" id="user-surname" placeholder="Введите Фамилию"required>
        <label for="birthdate">Дата рождения:</label>
        <input type="date" id="birthdate" placeholder="Введите дату рождения"required>
        <label for="login">Логин:</label>
        <input type="text" id="login" placeholder="Введите логин"required>
        <label for="password">Пароль:</label>
        <input type="password" id="password" placeholder="Введите пароль"required>
        <label for="repeat-password">Повторите пароль:</label>
        <input type="password" id="repeat-password" placeholder="Введите пароль"required>
        <button type="submit">Зарегистрироваться</button>
      </form>
    </div>
  </div>
  <script src="script.js"></script>
  <script src="homework-5.js"></script>
  <script src="homework-6.js"></script>
  <script src="homework-7.js" type="module"></script>
  <script src="homework-8.js" type="module"></script>
  <script src="homework-9.js"></script>
</body>
</html>
